{{ define "main" }}
<link rel="canonical" href="{{ .Params.redirect | absURL }}">
<script>location.replace('{{ .Params.redirect }}')</script>
<section style="padding:4rem 1rem;text-align:center;">
  <p><a href="{{ .Params.redirect }}">{{ .Title }}</a></p>
</section>
<noscript><meta http-equiv="refresh" content="0;url={{ .Params.redirect }}"></noscript>
{{ end }}
