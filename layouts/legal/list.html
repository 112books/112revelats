{{ define "main" }}
<section class="section page-content">
  <div class="section-inner">
    <h1>{{ .Title }}</h1>
    <div class="prose">
      <p>{{ .Description }}</p>
      <ul>
      {{ range .Pages.ByTitle }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
      </ul>
    </div>
  </div>
</section>
{{ end }}
