[faq_1_p]
  other = "Què és 112 Revelats?"
[faq_1_r]
  other = "Un projecte editorial col·lectiu que impulsa fotollibres amb autors emergents i consolidats."
[faq_2_p]
  other = "Com puc participar?"
[faq_2_r]
  other = "Cada sis mesos obrim un repte fotogràfic. Envia'ns el teu correu i t'avisarem quan obrim la pròxima convocatòria."
[faq_3_p]
  other = "He de pagar per participar?"
[faq_3_r]
  other = "No. Participar en el repte és gratuït. El fotollibre digital es publica sense cost. Si es vol edició en paper, es busca patrocini col·lectiu."
[faq_4_p]
  other = "Què passa amb les meves fotos?"
[faq_4_r]
  other = "Les fotos seleccionades passen a formar part del fotollibre col·lectiu, amb crèdit per a cada autor/a. Els drets segueixen sent teus."
[faq_5_p]
  other = "Com puc col·laborar com a mecene?"
[faq_5_r]
  other = "Pots fer una donació per a l'edició en paper del fotollibre, o apadrinar un autor emergent. Escriu-nos i t'expliquem les opcions."
