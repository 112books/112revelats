[faq_title]
  other = "Preguntas frecuentes (FAQ)"
[faq_1_p]
  other = "¿Qué es 112 Revelats?"
[faq_1_r]
  other = "Un proyecto editorial colectivo que impulsa fotolibros con autores emergentes y consolidados."
[faq_2_p]
  other = "¿Cómo puedo participar?"
[faq_2_r]
  other = "Cada seis meses abrimos un reto fotográfico. Envíanos tu correo y te avisaremos cuando abramos la próxima convocatoria."
[faq_3_p]
  other = "¿Tengo que pagar para participar?"
[faq_3_r]
  other = "No. Participar en el reto es gratuito. El fotolibro digital se publica sin coste. Si se quiere edición en papel, se busca patrocinio colectivo."
[faq_4_p]
  other = "¿Qué pasa con mis fotos?"
[faq_4_r]
  other = "Las fotos seleccionadas pasan a formar parte del fotolibro colectivo, con crédito para cada autor/a. Los derechos siguen siendo tuyos."
[faq_5_p]
  other = "¿Cómo puedo colaborar como mecenas?"
[faq_5_r]
  other = "Puedes hacer una donación para la edición en papel del fotolibro, o apadrinar a un autor emergente. Escríbenos y te explicamos las opciones."
